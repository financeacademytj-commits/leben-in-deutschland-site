<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vielen Dank</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      max-width: 560px;
      width: 92%;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 34px;
    }
    p {
      font-size: 18px;
      line-height: 1.7;
      color: #4b5563;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 24px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vielen Dank für deinen Kauf</h1>
    <p>Deine Zahlung war erfolgreich. Klicke unten, um dein PDF für Schleswig-Holstein herunterzuladen.</p>
    <a class="btn" href="PDF-LINK-HIER" target="_blank">Schleswig-Holstein PDF herunterladen</a>
  </div>
</body>
</html>
